<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 유치원 급식 알리미</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f7fa;
            text-align: center;
            color: #333;
        }
        .container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h1 {
            font-size: 1.5rem;
            color: #4A90E2;
            margin-bottom: 5px;
        }
        .date-title {
            font-size: 1.2rem;
            font-weight: bold;
            color: #666;
            margin-bottom: 20px;
        }
        .meal-img-box {
            width: 100%;
            min-height: 250px;
            background-color: #e9ecef;
            border-radius: 10px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }
        .meal-img-box img {
            width: 100%;
            height: auto;
            display: block;
        }
        .menu-list {
            background-color: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
            font-size: 1.1rem;
            line-height: 1.8;
            border-left: 5px solid #4A90E2;
        }
        .loading {
            font-size: 1.1rem;
            color: #888;
            padding: 40px 10px;
            line-height: 1.6;
        }
        .error {
            color: #d9534f;
            font-weight: bold;
        }
        .btn-link {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background-color: #4A90E2;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🍱 오늘의 급식 사진</h1>
    <div class="date-title" id="today-date">날짜 계산 중...</div>

    <div class="meal-img-box" id="img-container">
        <div class="loading" id="status-text">급식 정보를 불러오는 중입니다...</div>
    </div>

    <div class="menu-list" id="menu-container" style="display: none;"></div>
</div>

<script>
    // 1. 한국 시간 기준으로 오늘 날짜 정확하게 구하기
    const offset = new Date().getTimezoneOffset() * 60000;
    const today = new Date(Date.now() - offset);
    const year = today.getFullYear();
    const month = String(today.getMonth() + 1).padStart(2, '0');
    const day = String(today.getDate()).padStart(2, '0');
    
    // 포맷 두 가지 준비 (2026-07-03 형태 / 2026.07.03 형태)
    const todayStr1 = `${year}-${month}-${day}`;
    const todayStr2 = `${year}.${month}.${day}`;
    
    document.getElementById('today-date').innerText = `${year}년 ${month}월 ${day}일`;

    const targetUrl = "https://samsung-e.goeay.kr/samsung-e/ad/fm/foodmenu/selectFoodMenuView.do?mi=6769";
    const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

    fetch(proxyUrl)
        .then(response => {
            if (response.ok) return response.json();
            throw new Error('네트워크 문제');
        })
        .then(data => {
            const parser = new DOMParser();
            const doc = parser.parseFromString(data.contents, 'text/html');
            
            // 모든 td 칸을 다 훑으며 오늘 날짜가 적힌 칸 찾기
            const tds = doc.querySelectorAll('table tbody td, table tbody th');
            let targetTd = null;
            
            tds.forEach(td => {
                const txt = td.textContent.replace(/\s+/g, ''); // 공백 제거 후 비교
                if(txt.includes(todayStr1) || txt.includes(todayStr2) || txt.includes(`${parseInt(month)}월${parseInt(day)}일`)) {
                    targetTd = td;
                }
            });

            // 주간 식단표 요일 기반 대안 탐색
            if (!targetTd) {
                const dayIdx = new Date().getDay(); // 0:일, 1:월 ... 5:금, 6:토
                if (dayIdx >= 1 && dayIdx <= 5) { // 평일이면 요일 칸 매칭 시도
                    const weekTds = doc.querySelectorAll('table tbody td');
                    if(weekTds.length >= dayIdx) {
                        targetTd = weekTds[dayIdx - 1]; 
                    }
                }
            }

            if (targetTd) {
                // 식단 텍스트 정리
                let menuHtml = targetTd.innerHTML
                    .replace(/<span class="btn_s">.*?<\/span>/g, '')
                    .replace(/상세보기/g, '')
                    .replace(/<br\s*\/?>/gi, '<br>')
                    .trim();
                
                // 이미지 태그 찾기
                let imgTag = targetTd.querySelector('img');
                let imgUrl = imgTag ? imgTag.src : "";
                
                if(imgUrl && !imgUrl.startsWith('http')) {
                    if(imgUrl.startsWith('/')) {
                        imgUrl = "https://samsung-e.goeay.kr" + imgUrl;
                    } else {
                        imgUrl = "https://samsung-e.goeay.kr/samsung-e/ad/fm/foodmenu/" + imgUrl;
                    }
                }

                const imgContainer = document.getElementById('img-container');
                if(imgUrl && !imgUrl.includes('no_image')) {
                    imgContainer.innerHTML = `<img src="${imgUrl}" alt="오늘의 급식 사진" onerror="showNoImgMessage();">`;
                } else {
                    showNoImgMessage();
                }

                const menuContainer = document.getElementById('menu-container');
                menuContainer.innerHTML = `<strong>오늘의 메뉴:</strong><br>${menuHtml}`;
                menuContainer.style.display = "block";
                
            } else {
                showWeekendMessage();
            }
        })
        .catch(error => {
            console.error(error);
            document.getElementById('img-container').innerHTML = `
                <div class="loading">
                    <span class="error">학교 서버 연결이 일시적으로 원활하지 않습니다.</span><br><br>
                    아래 버튼을 누르면 학교 급식 게시판으로 바로 이동합니다.<br>
                    <a href="${targetUrl}&viewType=sub" class="btn-link" target="_blank">급식 게시판 바로가기</a>
                </div>`;
        });

    function showNoImgMessage() {
        document.getElementById('img-container').innerHTML = `
            <div class="loading">
                📸 오늘 자 급식 사진이 아직 업로드되지 않았습니다.<br>
                (식단 메뉴는 아래에서 확인할 수 있습니다.)
            </div>`;
    }

    function showWeekendMessage() {
        document.getElementById('img-container').innerHTML = `
            <div class="loading">
                <span class='error'>오늘 등록된 급식 정보가 없습니다.</span><br>
                주말, 공휴일이거나 방학 기간일 수 있습니다. 😴
            </div>`;
    }
</script>

</body>
</html>
